name: Site bug
description: Report a broken page, route, link, navigation item, or site build issue.
title: "[Site bug]: "
labels: ["site", "bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form only for standalone site issues.

        Do not include secrets, tokens, keys, private deployment data, sensitive logs, or exploit details.
        Do not report vulnerabilities publicly. Follow SECURITY.md instead.
        Product runtime, authentication, API, deployment, and operator reports belong in the published product repository or organization process for that component, not in this site repo.
  - type: input
    id: affected-page
    attributes:
      label: Affected page or path
      description: Name the public site page, route, or file path where the issue appears.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What is broken?
      description: Describe the site-only problem and what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the shortest steps needed to see the issue.
    validations:
      required: true
  - type: dropdown
    id: scope-check
    attributes:
      label: Scope check
      description: Confirm this is not a product/runtime/security report.
      options:
        - Site-only issue
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I have not included secrets, tokens, keys, sensitive logs, private deployment data, or vulnerability details.
          required: true
        - label: This is not about product runtime, authentication, API behavior, deployment behavior, operator support, or a security vulnerability.
          required: true
